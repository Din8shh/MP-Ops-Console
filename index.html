<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MP Operations Dashboard</title>
<meta name="description" content="Live ops-control console for the UPL 1+1=11 Kharif farm-mechanisation programme in Madhya Pradesh.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Noto Sans',system-ui,sans-serif;color:#1B1A17;background:#F6F5F2}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#d8d4cb;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes drwIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  select{appearance:none;-webkit-appearance:none}
  button{font-family:inherit}
  a{text-decoration:none}
  #app{height:100vh}
  .mono{font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { MACHINES as MACHINES_MOCK } from './machines.js';
import { BASE, COORDS } from './mapdata.js';

/* ============================= state ============================= */
const C = { orange:'#F5821F', orangeD:'#D96A12', green:'#1FAE43', greenD:'#159234', act:'#15A24A', idle:'#E0A008', brk:'#DC3A2B', ink:'#1B1A17', ink2:'#6E6A62', ink3:'#9C988F', line:'#E9E6DF', line2:'#F2F0EB', softO:'#FBEDDF', softG:'#E6F5EA', softR:'#FBEAE7', softA:'#FBF1DA' };
const state = { view:'map', org:'Both', terr:'', cluster:'', am:'', co:'', health:[], search:'', metric:'deploy', pinMode:'health', lbScope:'total', selected:null, expanded:{}, loaded:true, refreshing:false, device:'desktop' };
let scale=1, tx=0, ty=0, _g=null, _pinMap={}, _pinLabel=null, _prevSig=null, mapLocked=true;

/* ============================= helpers ============================= */
const E = s => (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const kebab = k => k.replace(/[A-Z]/g, m=>'-'+m.toLowerCase());
const css = o => Object.entries(o).map(([k,v])=>`${kebab(k)}:${v}`).join(';');
const fmt = n => Math.round(n).toLocaleString('en-IN');

/* ============================= data layer ============================= */
// ⬇️ Point this at the NEW per-machine sheet. Two options:
//   1) CONFIG.csvUrl   — full "Publish to web → CSV" link (recommended), OR
//   2) CONFIG.sheetId  — the sheet's ID (it must be shared "anyone with the link can view")
// Leave both blank to run on bundled demo data (machines.js).
const CONFIG = { csvUrl:'', sheetId:'1YFZD6RoccFJulCMyZB0jF0Z7ZoRU-8YaAMr6as8MTBs', sheetName:'Sheet1', refreshMinutes:10 };
// canonicalise territory names to the map's casing so e.g. "khargone"/"Khargone" merge into one territory
const TERR_CANON={}; for(const k in COORDS) TERR_CANON[k.toLowerCase()]=k;
const canonTerr = s => { s=String(s||'').trim(); return TERR_CANON[s.toLowerCase()]||s; };
let ROWS = MACHINES_MOCK;
let dataMode = 'demo';      // 'demo' | 'live' | 'error'
let lastUpdated = '';
function nowIST(){ try{ return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'}); }catch(_){ return new Date().toLocaleTimeString(); } }
function liveUrl(){
  if(CONFIG.csvUrl) return CONFIG.csvUrl + (CONFIG.csvUrl.includes('?')?'&':'?') + 't=' + Date.now();
  if(CONFIG.sheetId) return `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.sheetName)}&t=${Date.now()}`;
  return '';
}
function parseCSV(text){ const rows=[]; let i=0,f='',row=[],q=false;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(f);f='';}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(f);rows.push(row);row=[];f=''; } else f+=c; } i++; }
  if(f.length||row.length){row.push(f);rows.push(row);} return rows;
}
const num = v => { const n=parseFloat(String(v==null?'':v).replace(/[, ]/g,'')); return isFinite(n)?n:0; };
const txt = v => String(v==null?'':v).trim().replace(/\.0$/,'');   // keep phones as text; drop a stray trailing .0
function parseScanned(s){ s=String(s||'').trim(); if(!s) return [];
  return s.split(',').map(tok=>{ tok=tok.trim(); if(!tok) return null;
    const m=tok.match(/^(.*?)[\s:]*(\d+(?:\.\d+)?)\s*$/);
    if(m){ const name=m[1].trim(); return { product:name||'Unspecified', acres:num(m[2]) }; }
    return { product:tok, acres:0 };       // unparseable token → bucket, never crash
  }).filter(Boolean);
}
function parseLoc(s){ s=String(s||'').trim(); if(!s) return [null,null];
  const m=s.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/); if(!m) return [null,null];
  const lat=parseFloat(m[1]), lon=parseFloat(m[2]); return [isFinite(lat)?lat:null, isFinite(lon)?lon:null];
}
function resolveCols(header){
  const h=header.map(x=>String(x||'').trim().toLowerCase());
  const find=(...preds)=>{ for(const p of preds){ const i=h.findIndex(p); if(i>=0) return i; } return -1; };
  const c = {
    mc: find(x=>x.includes('machine')&&(x.includes('number')||x.includes('no.')||x===' machine no'), x=>x==='mc', x=>x==='machine no'),
    org: find(x=>x.includes('organis')||x.includes('organiz'), x=>x==='org'),
    territory: find(x=>x.includes('territory')),
    cluster: find(x=>x.includes('cluster')&&!x.includes('officer')),
    co: find(x=>x.includes('cluster officer')&&!(x.includes('mob')||x.includes('number')||x.includes('phone'))),
    coMob: find(x=>x.includes('officer')&&(x.includes('mob')||x.includes('number')||x.includes('phone'))),
    am: find(x=>x.includes('area manager')&&!(x.includes('number')||x.includes('mob')||x.includes('phone'))),
    amNum: find(x=>x.includes('area manager')&&(x.includes('number')||x.includes('mob')||x.includes('phone'))),
    target: find(x=>x.includes('target')),
    achieved: find(x=>x.includes('achieved')),
    mtd: find(x=>x.includes('mtd')),
    acresY: find(x=>x.includes('yesterday')&&x.includes('acres')&&!x.includes('iot')&&!x.includes('ping'), x=>x.includes('yesterday')&&!x.includes('iot')&&!x.includes('ping')),
    pinged: find(x=>x.includes('ping')&&x.includes('yesterday'), x=>x.includes('pinged')&&!x.includes('date')&&!x.includes('days')&&!x.includes('since')),
    scanned: find(x=>x.includes('scanned')),
    breakdown: find(x=>x.includes('breakdown')),
    opMapped: find(x=>x.includes('mapped')),
    opNum: find(x=>x.includes('operator')&&(x.includes('number')||x.includes('mob')||x.includes('phone'))),
    opName: find(x=>x.includes('operator')&&x.includes('name'), x=>x.includes('operator')&&!(x.includes('number')||x.includes('mob')||x.includes('phone')||x.includes('mapped'))),
    loc: find(x=>x.includes('location')||(x.includes('lat')&&x.includes('lon'))),
  };
  // Positional fallback for the IoT/connectivity block — sheet cols S/T/U/V (idx 18/19/20/21).
  // Keyword match wins; positional only kicks in when a header didn't match and the row is wide enough.
  if(c.pinged<0 && h.length>19) c.pinged=19;
  return c;
}
function rowsToMachines(grid){
  if(grid.length<2) return [];
  const col=resolveCols(grid[0]); const out=[];
  for(let r=1;r<grid.length;r++){ const row=grid[r]; if(!row||!row.join('').trim()) continue;
    const g=i=>i>=0&&i<row.length?row[i]:'';
    const mc=txt(g(col.mc)); if(!mc) continue;
    const [lat,lon]=parseLoc(g(col.loc));
    out.push({
      mc, org:(txt(g(col.org)).toUpperCase()==='SWAL'?'SWAL':'UPL'),
      territory:canonTerr(txt(g(col.territory)))||'Unassigned', cluster:txt(g(col.cluster))||'Unassigned',
      co:txt(g(col.co)), coMob:txt(g(col.coMob)), am:txt(g(col.am)), amNum:txt(g(col.amNum)),
      target:num(g(col.target)), achieved:num(g(col.achieved)), mtd:num(g(col.mtd)), acresY:num(g(col.acresY)),
      scanned:parseScanned(g(col.scanned)),
      breakdown:(txt(g(col.breakdown))==='1'?1:0), opMapped:(txt(g(col.opMapped))==='1'?1:0),
      pinged:(txt(g(col.pinged))==='1'?1:0),
      opName:txt(g(col.opName)), opNum:txt(g(col.opNum)), lat, lon
    });
  }
  return out;
}
// Merge name groups that differ only by case or whitespace. For each field, normalise
// (trim + collapse internal spaces + lowercase) as the grouping key, then rewrite every
// row's value to the most-common original spelling for that key (ties → first seen).
// Keeps grouping in Tables / AM / Leaderboard / filters from splitting on casing noise.
function canonicalizeNames(rows){
  ['cluster','am','co','opName'].forEach(f=>{
    const cnt={}, disp={};
    rows.forEach(m=>{ const v=String(m[f]||'').trim().replace(/\s+/g,' '); if(!v) return; const k=v.toLowerCase(); cnt[k]=(cnt[k]||0)+1; (disp[k]||(disp[k]={}))[v]=(disp[k][v]||0)+1; });
    const canon={}; for(const k in disp){ canon[k]=Object.keys(disp[k]).sort((a,b)=>disp[k][b]-disp[k][a])[0]; }
    rows.forEach(m=>{ const v=String(m[f]||'').trim().replace(/\s+/g,' '); if(v) m[f]=canon[v.toLowerCase()]; });
  });
  return rows;
}
async function loadData(){
  const url=liveUrl();
  if(!url){ dataMode='demo'; ROWS=canonicalizeNames(MACHINES_MOCK); lastUpdated=nowIST(); render(); loadWeather(); return; }
  try{
    const res=await fetch(url); if(!res.ok) throw new Error('HTTP '+res.status);
    const machines=rowsToMachines(parseCSV(await res.text()));
    if(!machines.length) throw new Error('no rows parsed');
    ROWS=canonicalizeNames(machines); dataMode='live'; lastUpdated=nowIST(); render(); loadWeather();
  }catch(e){ ROWS=canonicalizeNames(MACHINES_MOCK); dataMode='error'; lastUpdated=nowIST(); render(); loadWeather(); console.error('CSV load failed:', e); }
}

/* ============================= derived ============================= */
// Active = ran yesterday (>0 acres) — wins over the breakdown flag; else flagged-broken = Breakdown; else Idle.
const hstate = m => (m.acresY>0) ? 'Active' : (m.breakdown ? 'Breakdown' : 'Idle');
const hcolor = s => s==='Active'?C.act : s==='Idle'?C.idle : C.brk;
const pctOf = m => m.target ? m.achieved/m.target : 0;
const band = p => p>=0.7?'On-track' : p>=0.4?'At-risk' : 'Behind';
const bcolor = b => b==='On-track'?C.act : b==='At-risk'?C.idle : C.brk;

function getF(){
  const s = state.search.trim().toLowerCase();
  return ROWS.filter(m=>{
    if(state.org!=='Both' && m.org!==state.org) return false;
    if(state.terr && m.territory!==state.terr) return false;
    if(state.cluster && m.cluster!==state.cluster) return false;
    if(state.am && (m.am||'').trim().toLowerCase()!==state.am.trim().toLowerCase()) return false;
    if(state.co && (m.co||'').trim().toLowerCase()!==state.co.trim().toLowerCase()) return false;
    if(state.health.length && !state.health.includes(hstate(m))) return false;
    if(s && !(m.mc.toLowerCase().includes(s) || (m.opName&&m.opName.toLowerCase().includes(s)) || m.territory.toLowerCase().includes(s))) return false;
    return true;
  });
}
function roll(list){
  const o={deployed:list.length,upl:0,swal:0,Active:0,Idle:0,Breakdown:0,target:0,achieved:0,mtd:0,acresY:0,opMappedCount:0};
  list.forEach(m=>{ o[m.org==='UPL'?'upl':'swal']++; o[hstate(m)]++; o.target+=m.target; o.achieved+=m.achieved; o.mtd+=m.mtd; o.acresY+=m.acresY; if(m.opName&&m.opNum&&m.opNum!=='0')o.opMappedCount++; });
  o.pct = o.target ? o.achieved/o.target : 0; o.band=band(o.pct); o.ranY=list.filter(m=>m.acresY>0).length; return o;
}
function opMapLabel(r){ return r.opMappedCount+'/'+r.deployed; }
// dominant name by count (case-insensitive), returning the most-common original spelling + "+N" for extra distinct names
function dominantName(list, field){
  const cnt={}, disp={};
  list.forEach(m=>{ const v=(m[field]||'').trim(); if(!v)return; const k=v.toLowerCase(); cnt[k]=(cnt[k]||0)+1; (disp[k]||(disp[k]={}))[v]=(disp[k][v]||0)+1; });
  const keys=Object.keys(cnt); if(!keys.length) return '';
  keys.sort((a,b)=>cnt[b]-cnt[a]);
  const variants=disp[keys[0]], rep=Object.keys(variants).sort((a,b)=>variants[b]-variants[a])[0];
  return rep + (keys.length>1?` +${keys.length-1}`:'');
}
function coAmLabel(list){ const co=dominantName(list,'co'), am=dominantName(list,'am'); return co&&am?`${co} · ${am}`:(co||am); }
// most-common representative spelling from an array of strings (case-insensitive)
function domStr(arr){ const cnt={},disp={}; arr.forEach(v=>{ v=(v||'').trim(); if(!v)return; const k=v.toLowerCase(); cnt[k]=(cnt[k]||0)+1; (disp[k]||(disp[k]={}))[v]=(disp[k][v]||0)+1; }); const ks=Object.keys(cnt); if(!ks.length)return ''; ks.sort((a,b)=>cnt[b]-cnt[a]); const vv=disp[ks[0]]; return Object.keys(vv).sort((a,b)=>vv[b]-vv[a])[0]; }
// distinct names with representative casing (case-insensitive dedupe), alphabetical — for the AM/CO dropdowns
function distinctNames(list, field){
  const disp={};
  list.forEach(m=>{ const v=(m[field]||'').trim(); if(!v)return; const k=v.toLowerCase(); (disp[k]||(disp[k]={}))[v]=(disp[k][v]||0)+1; });
  return Object.keys(disp).map(k=>{ const v=disp[k]; return Object.keys(v).sort((a,b)=>v[b]-v[a])[0]; }).sort((a,b)=>a.localeCompare(b));
}
function rowBars(r){ const tt=r.deployed||1; return {
  orgUStyle:{width:(100*r.upl/tt)+'%',background:C.orange,display:'block'}, orgSStyle:{width:(100*r.swal/tt)+'%',background:C.green,display:'block'},
  mixAStyle:{width:(100*r.Active/tt)+'%',background:C.act,display:'block'}, mixIStyle:{width:(100*r.Idle/tt)+'%',background:C.idle,display:'block'}, mixBStyle:{width:(100*r.Breakdown/tt)+'%',background:C.brk,display:'block'},
  mixLabel:`${r.Active} active · ${r.Idle} idle · ${r.Breakdown} down`,
  paceBarStyle:{display:'block',height:'100%',width:Math.min(100,100*r.pct)+'%',background:C.act},
  acresLabel:`${fmt(r.achieved)} / ${fmt(r.target)}`, ranY:fmt(r.acresY) }; }
function hash(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0; return h; }
function lerpHex(a,b,t){ t=Math.max(0,Math.min(1,t)); const pa=[1,3,5].map(i=>parseInt(a.substr(i,2),16)), pb=[1,3,5].map(i=>parseInt(b.substr(i,2),16)); return '#'+pa.map((v,i)=>Math.round(v+(pb[i]-v)*t).toString(16).padStart(2,'0')).join(''); }
let WX={};   // territory(lowercase) -> { rain, tmax, tmin, wind, code } — live Open-Meteo, "yesterday" IST
function mockRainOf(terr){ const h=hash('rain2'+terr); const base=((h>>>4)%1000)/1000; return Math.round(Math.pow(base,1.7)*44*10)/10; }
function rainOf(terr){ const w=WX[String(terr||'').trim().toLowerCase()]; return (w&&w.rain!=null)? Math.round(w.rain*10)/10 : mockRainOf(terr); }
// distinct rainfall buckets (high/med/low visually separable) instead of a continuous ramp
const RAIN_BUCKETS=[
  {max:0.1, c:'#EDEAE2', l:'Dry'},
  {max:2,   c:'#CFE6F7', l:'<2'},
  {max:5,   c:'#86C0E8', l:'2–5'},
  {max:10,  c:'#4793CE', l:'5–10'},
  {max:20,  c:'#2563A8', l:'10–20'},
  {max:1e9, c:'#0C3B72', l:'20+'},
];
function rainColor(mm){ mm=mm||0; for(const b of RAIN_BUCKETS) if(mm<b.max) return b.c; return RAIN_BUCKETS[RAIN_BUCKETS.length-1].c; }
function rainInk(mm){ return (mm||0)>=5?'#FFFFFF':'#1B1A17'; }
function rainLegendHTML(){ return `<div style="display:flex;flex-direction:column;gap:4px">${RAIN_BUCKETS.map(b=>`<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;flex-shrink:0;background:${b.c};border:1px solid rgba(0,0,0,.06)"></span><span style="font-size:11px;color:#6E6A62">${b.l}${b.max>=1e9?' mm':b.max===0.1?'':' mm'}</span></div>`).join('')}</div>`; }
const SPRAY={ good:{label:'Good spray day',icon:'☀️',bg:C.softG,border:'#C6EBD1',ink:C.greenD}, marg:{label:'Marginal window',icon:'⛅',bg:C.softA,border:'#F0DFB0',ink:'#9A6B05'}, hold:{label:'Hold — high wind / rain',icon:'🌧️',bg:C.softR,border:'#F2C9C2',ink:'#B0301F'} };
function mockWeather(terr){ const h=hash(terr), k=h%3; const temp=28+(h>>3)%7, wind=4+(h>>5)%16, rain=k===2?((h>>2)%9)/10+0.6:0; const w=[SPRAY.good,SPRAY.marg,SPRAY.hold][k]; return { ...w, line:`${temp}° · wind ${wind} km/h · rain ${rain.toFixed(1)} mm` }; }
function weather(terr){ const w=WX[String(terr||'').trim().toLowerCase()]; if(!w) return mockWeather(terr);
  const rain=w.rain||0, wind=Math.round(w.wind||0), temp=Math.round(w.tmax!=null?w.tmax:0);
  const v = (rain>=5||wind>=20)?SPRAY.hold : (rain>=1||wind>=15)?SPRAY.marg : SPRAY.good;   // spray window: hold if wet/windy
  return { ...v, line:`${temp}° · wind ${wind} km/h · rain ${rain.toFixed(1)} mm` };
}
async function loadWeather(){
  try{
    const terrs=[...new Set(ROWS.map(m=>m.territory))].map(t=>({t,c:coordsOf(t)})).filter(x=>x.c);
    if(!terrs.length) return;
    const ax=terrs.reduce((s,x)=>s+x.c[0],0)/terrs.length, ay=terrs.reduce((s,x)=>s+x.c[1],0)/terrs.length;
    terrs.push({t:'Madhya Pradesh',c:[ax,ay]});   // statewide point for the unfiltered mobile banner
    const lats=terrs.map(x=>x.c[1]).join(','), lons=terrs.map(x=>x.c[0]).join(',');
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&past_days=1&forecast_days=1&timezone=Asia%2FKolkata&wind_speed_unit=kmh`;
    const res=await fetch(url); if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json(), arr=Array.isArray(j)?j:[j], wx={};
    arr.forEach((loc,i)=>{ const x=terrs[i], d=loc&&loc.daily; if(!x||!d) return;
      wx[x.t.toLowerCase()]={ rain:(d.precipitation_sum||[])[0]||0, tmax:(d.temperature_2m_max||[])[0], tmin:(d.temperature_2m_min||[])[0], wind:(d.wind_speed_10m_max||[])[0]||0, code:(d.weather_code||[])[0] };
    });
    WX=wx; render();
  }catch(e){ console.error('weather load failed (using simulated):', e); }
}
const acresBand = a => a>10?0 : a>=5?1 : a>=1?2 : 3;
const acresColor = a => ['#0E7C39','#56B36C','#A9D8B4','#CBC6BC'][acresBand(a)];

/* ============================= geometry / map ============================= */
let W,H,proj;
function setupProj(){
  let mnLon=999,mxLon=-999,mnLat=999,mxLat=-999;
  const walk=c=>{ if(typeof c[0]==='number'){ mnLon=Math.min(mnLon,c[0]);mxLon=Math.max(mxLon,c[0]);mnLat=Math.min(mnLat,c[1]);mxLat=Math.max(mxLat,c[1]); } else c.forEach(walk); };
  BASE.features.forEach(f=>walk(f.geometry.coordinates));
  const PAD=24, WW=1000, midLat=(mnLat+mxLat)/2, kx=Math.cos(midLat*Math.PI/180);
  const sc=(WW-2*PAD)/((mxLon-mnLon)*kx), HH=Math.round((mxLat-mnLat)*sc+2*PAD);
  W=WW; H=HH;
  proj=(lon,lat)=>[PAD+(lon-mnLon)*kx*sc, PAD+(mxLat-lat)*sc];
}
function pathOf(g){ const ring=r=>r.map((p,i)=>{const[x,y]=proj(p[0],p[1]);return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);}).join('')+'Z'; let d=''; const polys=g.type==='Polygon'?g.coordinates:[].concat(...g.coordinates); polys.forEach(r=>d+=ring(r)); return d; }
const NS='http://www.w3.org/2000/svg';
const COORDS_LC={}; for(const k in COORDS) COORDS_LC[k.toLowerCase()]=COORDS[k];
const coordsOf = name => COORDS[name] || COORDS_LC[String(name||'').trim().toLowerCase()];
function applyTransform(){ if(_g) _g.setAttribute('transform',`translate(${tx} ${ty}) scale(${scale})`); }
function mapHostEl(){ const svg=_g&&_g.ownerSVGElement; return svg&&svg.parentElement; }
function setMapLock(locked){ mapLocked=locked; const h=mapHostEl(); if(h) h.style.cursor=locked?'default':'grab'; }
function attachPanZoom(svg){
  let down=false,moved=false,sx=0,sy=0;
  if(svg.parentElement) svg.parentElement.style.cursor = mapLocked?'default':'grab';
  svg.addEventListener('pointerdown',e=>{ if(mapLocked)return; down=true; moved=false; sx=e.clientX; sy=e.clientY; });

            <a href="${E(d.coTel)}" data-stop="1" style="width:32px;height:32px;border-radius:8px;background:#F2F0EB;color:#1B1A17;display:flex;align-items:center;justify-content:center;flex-shrink:0">${I.phoneS}</a>

            <div style="flex:1"><div style="font-size:10px;color:#9C988F;text-transform:uppercase;letter-spacing:.04em">Area Manager</div><div style="font-size:12.5px;font-weight:600;margin-top:1px">${E(d.amName)}</div><div style="font-family:'IBM Plex Mono';font-size:11px;color:#6E6A62">${E(d.amNum)}</div></div>
            <a href="${E(d.amTel)}" data-stop="1" style="width:32px;height:32px;border-radius:8px;background:#F2F0EB;color:#1B1A17;display:flex;align-items:center;justify-content:center;flex-shrink:0">${I.phoneS}</a>

  return `<div style="height:100vh;width:100%;background:#E7E4DE;display:flex;align-items:center;justify-content:center;padding:18px">
    <div style="width:392px;height:840px;max-height:96vh;background:#F6F5F2;border-radius:44px;border:11px solid #15140F;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 30px 90px rgba(0,0,0,.32)">
      <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:118px;height:25px;background:#15140F;border-radius:0 0 16px 16px;z-index:8"></div>

          <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#F5821F,#1FAE43);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10.5px;letter-spacing:.02em;color:#fff">UPL</div>
          <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700;line-height:1.1">MP Operations</div><div style="font-size:10px;color:#9C988F">1+1=11 Kharif · AFS</div></div>
          <div style="display:flex;align-items:center;gap:6px;margin-right:4px"><span style="width:7px;height:7px;border-radius:50%;background:${v.statusDot}"></span><span style="font-size:10.5px;font-weight:600;color:#6E6A62">${E(v.statusTime)}</span></div>
          <button data-act="device" title="Desktop" style="width:30px;height:30px;border:1px solid #E9E6DF;border-radius:8px;background:#fff;color:#6E6A62;display:flex;align-items:center;justify-content:center;cursor:pointer">${I.desktop}</button>

      <div style="flex:1;overflow:auto;padding:14px 16px 24px">
        <div style="display:flex;align-items:center;gap:11px;background:${v.mobileWeather.bg};border:1px solid ${v.mobileWeather.border};border-radius:14px;padding:12px 14px;margin-bottom:14px">

        <div style="display:flex;background:#EDEAE3;border-radius:11px;padding:3px;gap:2px;margin-bottom:14px">
          <button data-act="view" data-view="map" style="${css(segM(S.view==='map'))}">Map</button>
          <button data-act="view" data-view="tables" style="${css(segM(S.view==='tables'))}">Machines</button>

/* ============================= render / events ============================= */
const app=document.getElementById('app');
function render(){
  const ae=document.activeElement; const focusId=ae&&ae.id; const selStart=ae&&ae.selectionStart;
  const v=vals();
  app.innerHTML = state.device==='mobile' ? mobileHTML(v) : desktopHTML(v);
  // restore inputs/selects + focus
  const si=document.getElementById('searchInput'); if(si){ si.value=state.search; }
  if(focusId){ const el=document.getElementById(focusId); if(el){ el.focus(); if(selStart!=null&&el.setSelectionRange){ try{el.setSelectionRange(selStart,selStart);}catch(_){ } } } }
  paint();
}
function paint(){
  const S=state, mob=S.device==='mobile';
  try{
    if(S.view==='map') drawMap(mob?'mMapHost':'mapHost', S.metric);
    else if(S.view==='weather') drawMap(mob?'mwMapHost':'wMapHost', 'weather');
    else if(S.view==='machines' && !mob) drawPins('pinHost');
    if(!mob && S.selected) drawDrawerMap();
  }catch(err){ console.error('paint failed:', err); }
}
function setState(patch){ if(typeof patch==='function') patch=patch(state); Object.assign(state, patch); render(); }

app.addEventListener('input', e=>{ if(e.target.id==='searchInput') setState({search:e.target.value}); });
app.addEventListener('change', e=>{
  if(e.target.id==='terrSelect') setState({terr:e.target.value, cluster:''});
  else if(e.target.id==='clusterSelect') setState({cluster:e.target.value});
  else if(e.target.id==='amSelect') setState({am:e.target.value, co:''});
  else if(e.target.id==='coSelect') setState({co:e.target.value});
});
app.addEventListener('click', e=>{
  if(e.target.closest('a[data-stop]')) { e.stopPropagation(); return; } // let tel: link work, don't open row
  const el=e.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act;
  switch(act){
    case 'view': if(gateExpired()){ gateLock(); break; } mapLocked=true; scale=1; tx=0; ty=0; setState({view:el.dataset.view}); break;
    case 'device': mapLocked=true; scale=1; tx=0; ty=0; setState(s=>{ const dev=s.device==='mobile'?'desktop':'mobile'; const view=(dev==='mobile'&&(s.view==='machines'||s.view==='am'||s.view==='leader'))?'map':s.view; return {device:dev,selected:null,view}; }); break;
    case 'org': { const want=el.dataset.org; if(gateAllows(want)){ setState({org:want}); } else { gateShow(()=>setState({org: gateAllows(want)?want:gateDefaultOrg()}), `Enter PIN for ${want} access`, true); } break; }
    case 'metric': setState({metric:el.dataset.metric}); break;
    case 'lbscope': setState({lbScope:el.dataset.scope}); break;
    case 'pinmode': setState({pinMode:el.dataset.mode}); break;
    case 'health': { const h=el.dataset.h; setState(s=>({health: s.health.includes(h)? s.health.filter(x=>x!==h) : [...s.health,h]})); break; }
    case 'clear': setState({org:gateDefaultOrg(),terr:'',cluster:'',am:'',co:'',health:[],search:''}); break;
    case 'refresh': state.refreshing=true; render(); loadData().finally(()=>{ state.refreshing=false; render(); }); break;
    case 'terr': { const t=el.dataset.terr; setState(s=>({terr: s.terr===t?'':t, cluster:''})); break; }
    case 'exp': { const k=el.dataset.key; setState(s=>({expanded:{...s.expanded,[k]:!s.expanded[k]}})); break; }
    case 'open': { const m=ROWS.find(x=>x.mc===el.dataset.mc); if(m) setState({selected:m}); break; }
    case 'close': setState({selected:null}); break;
    case 'zoomin': setMapLock(false); scale=Math.min(6,scale*1.25); applyTransform(); break;
    case 'zoomout': setMapLock(false); scale=Math.max(0.6,scale*0.8); applyTransform(); break;
    case 'zoomreset': setMapLock(true); scale=1;tx=0;ty=0; applyTransform(); break;
  }
});
// machine table row <-> pin cross-highlight
app.addEventListener('mouseover', e=>{ const row=e.target.closest('#machineTable [data-mc]'); if(row){ highlightPin(row.dataset.mc,true); } });
app.addEventListener('mouseout', e=>{ const row=e.target.closest('#machineTable [data-mc]'); if(row){ highlightPin(row.dataset.mc,false); } });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&state.selected) setState({selected:null}); });

/* ============================= access gate (PIN) =============================
   SOFT client-side gate only. The dashboard is a static site, so this PIN check
   runs in the browser and can be bypassed by anyone who opens DevTools. It stops
   casual viewing and enforces the 30-min re-auth UX — it is NOT real security.
   PINs are stored as SHA-256 hashes (needs https/localhost; file:// won't hash). */
const GATE = {
  TTL_MS: 30*60*1000,           // 30-minute idle expiry
  SKEY: 'mpoc_gate',
  ROLES: {                       // sha256(pin) -> role scope
    'c64306c91d63dfeed553ccc9e3ba29bc7e84449a67c5714a2f5f497d140f845f': { role:'admin', org:'Both', allow:['Both','UPL','SWAL'], label:'Admin' }, // 0088
    '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c': { role:'upl',   org:'UPL',  allow:['UPL'],               label:'UPL'   }, // 1111
    'edee29f882543b956620b26d0ee0e7e950399b1c4222f5de05e06425b4c995e9': { role:'swal',  org:'SWAL', allow:['SWAL'],              label:'SWAL'  }, // 2222
  },
  cur:null, timer:null,
};
async function sha256(s){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function gateAllows(org){ return GATE.cur ? GATE.cur.allow.includes(org) : false; }
function gateDefaultOrg(){ return GATE.cur ? GATE.cur.org : 'Both'; }
function gateArmTimer(ms){ clearTimeout(GATE.timer); GATE.timer=setTimeout(gateLock, Math.max(0,ms)); }
function gateSave(r){ GATE.cur=r; try{ sessionStorage.setItem(GATE.SKEY, JSON.stringify({role:r.role, at:Date.now()})); }catch(_){ } gateArmTimer(GATE.TTL_MS); }
function gateRead(){ try{ return JSON.parse(sessionStorage.getItem(GATE.SKEY)||'null'); }catch(_){ return null; } }
function gateExpired(){ const o=gateRead(); return !o||!o.role||(Date.now()-(o.at||0))>=GATE.TTL_MS; }
function gateRestore(){ const o=gateRead(); if(!o||!o.role) return false; const age=Date.now()-(o.at||0); if(age>=GATE.TTL_MS) return false; const f=Object.values(GATE.ROLES).find(r=>r.role===o.role); if(!f) return false; GATE.cur=f; gateArmTimer(GATE.TTL_MS-age); return true; }
function gateLock(){ clearTimeout(GATE.timer); GATE.cur=null; try{ sessionStorage.removeItem(GATE.SKEY); }catch(_){ } gateShow(()=>bootApp()); }
function gateHide(){ const ov=document.getElementById('gateOv'); if(ov) ov.style.display='none'; }
function gateShow(onOk, msg, cancelable){
  let ov=document.getElementById('gateOv');
  if(!ov){
    ov=document.createElement('div'); ov.id='gateOv';
    ov.style.cssText="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#F6F5F2;font-family:'Noto Sans',system-ui,sans-serif";
    ov.innerHTML=`<div style="width:340px;max-width:90vw;background:#fff;border:1px solid #E9E6DF;border-radius:16px;padding:30px 28px;box-shadow:0 12px 40px rgba(0,0,0,.08);text-align:center">
      <div style="font-size:12px;font-weight:700;letter-spacing:.14em;color:#D96A12;text-transform:uppercase">MP Operations</div>
      <div style="font-size:20px;font-weight:700;margin-top:6px;color:#1B1A17">Enter access PIN</div>
      <div id="gateMsg" style="font-size:12.5px;color:#6E6A62;margin-top:6px;min-height:16px"></div>
      <input id="gateInput" type="password" inputmode="numeric" autocomplete="off" maxlength="4" aria-label="Access PIN"
        style="margin-top:16px;width:100%;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:30px;letter-spacing:.5em;padding:12px 0 12px .5em;border:1.5px solid #E9E6DF;border-radius:10px;outline:none;color:#1B1A17">
      <div id="gateErr" style="font-size:12px;color:#DC3A2B;margin-top:10px;min-height:15px;font-weight:600"></div>
      <button id="gateCancel" type="button" style="display:none;margin-top:14px;width:100%;padding:10px 0;background:#fff;border:1.5px solid #E9E6DF;border-radius:9px;color:#6E6A62;font-size:13.5px;font-weight:600;cursor:pointer">← Cancel · keep current view</button>
      <div style="font-size:10.5px;color:#9C988F;margin-top:14px;line-height:1.4">Access auto-expires after 30 min of inactivity. <span style="opacity:.6">· build c3</span></div>
    </div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#gateInput');
    inp.addEventListener('input', async ()=>{
      inp.value=inp.value.replace(/\D/g,'').slice(0,4);
      ov.querySelector('#gateErr').textContent='';
      if(inp.value.length!==4) return;
      let h; try{ h=await sha256(inp.value); }catch(_){ ov.querySelector('#gateErr').textContent='PIN check needs https — open the live site.'; inp.value=''; return; }
      const role=GATE.ROLES[h];
      if(role){ inp.value=''; gateSave(role); gateHide(); (ov._onOk||function(){})(role); }
      else { ov.querySelector('#gateErr').textContent='Incorrect PIN'; inp.value=''; }
    });
    ov.querySelector('#gateCancel').addEventListener('click', ()=>{ if(ov._cancelable){ ov._onOk=null; gateHide(); } });
    ov.addEventListener('keydown', e=>{ if(e.key==='Escape' && ov._cancelable){ ov._onOk=null; gateHide(); } });
  }
  ov._onOk=onOk||function(){};
  ov._cancelable=!!cancelable;
  ov.querySelector('#gateCancel').style.display = cancelable ? 'inline-block' : 'none';
  ov.querySelector('#gateMsg').textContent=msg||'';
  ov.querySelector('#gateErr').textContent='';
  ov.style.display='flex';
  const inp=ov.querySelector('#gateInput'); inp.value=''; setTimeout(()=>inp.focus(),30);
}
// re-check expiry when the user returns to the tab (timers can stall during sleep)
window.addEventListener('focus', ()=>{ if(_booted && gateExpired()) gateLock(); });
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && _booted && gateExpired()) gateLock(); });

/* ============================= mount ============================= */
let _booted=false;
function bootApp(){
  if(_booted){ if(!gateAllows(state.org)) state.org=gateDefaultOrg(); render(); return; }
  _booted=true;
  state.org=gateDefaultOrg();
  setupProj();
  render();
  loadData();
  if(CONFIG.refreshMinutes>0) setInterval(loadData, CONFIG.refreshMinutes*60000);
}
if(gateRestore()) bootApp(); else gateShow(()=>bootApp());
</script>
